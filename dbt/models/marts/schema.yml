version: 2

models:
  - name: customer_summary
    description: One row per customer containing customer profile, shopping behaviour, and loyalty metrics.

    columns:
      - name: customer_id
        description: Unique customer identifier.
        tests:
          - not_null

      - name: total_sessions
        description: Total number of shopping sessions.

      - name: total_spent
        description: Total amount spent across all purchases.

  - name: customer_product_summary
    description: One row per customer and product summarizing purchasing behaviour.

    columns:
      - name: customer_id
        description: Customer identifier.
        tests:
          - not_null

      - name: sku
        description: Product SKU.
        tests:
          - not_null

      - name: total_quantity
        description: Total quantity purchased.

      - name: total_spent
        description: Total revenue generated by the customer for the product.

  - name: product_sales_summary
    description: One row per product summarizing overall sales performance.

    columns:
      - name: sku
        description: Product SKU.
        tests:
          - not_null

      - name: total_quantity_sold
        description: Total quantity sold.

      - name: total_revenue
        description: Total revenue generated.

  - name: channel_sales_summary
    description: One row per sales channel summarizing channel performance.

    columns:
      - name: channel
        description: Sales channel.
        tests:
          - not_null

      - name: total_revenue
        description: Total revenue generated by the channel.

  - name: discount_summary
    description: One row per discount summarizing promotion usage.

    columns:
      - name: discount_name
        description: Discount or promotion name.
        tests:
          - not_null

      - name: total_discount_amount
        description: Total discount amount applied.

      - name: total_discount_applications
        description: Number of times the discount was applied.